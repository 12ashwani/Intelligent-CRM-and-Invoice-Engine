<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoice System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('index') }}">Invoice System</a>
        <div class="d-flex gap-2 flex-wrap justify-content-end">
            <a href="{{ url_for('invoice.invoice_ui') }}" class="btn btn-light btn-sm">Invoices</a>
            <a href="{{ url_for('customer.customer_ui') }}" class="btn btn-light btn-sm">Customers</a>
            <a href="{{ url_for('company.company_settings') }}" class="btn btn-info btn-sm">Company</a>
            <a href="{{ CRM_URL }}/accounts/payments" class="btn btn-danger btn-sm">Back to CRM</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' else category }} mb-3">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>

</body>
</html>
